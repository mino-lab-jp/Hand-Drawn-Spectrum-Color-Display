<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no">

  <title>Hand-Drawn-Spectrum-Color-Display</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      width: 100%;
      height: 100%;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    canvas {
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .controlButton {
      position: fixed;
      height: 34px;
      min-width: 68px;
      padding: 4px 10px;
      font-size: 14px;
      line-height: 1.2;
      border: 1px solid #555;
      border-radius: 6px;
      background: white;
      color: black;
      font-family: sans-serif;
      z-index: 10;
      touch-action: manipulation;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script src="sketch.js"></script>
</head>

<body>
</body>
</html>
