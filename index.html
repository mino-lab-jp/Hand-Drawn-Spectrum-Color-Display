<!DOCTYPE html>

  <!-- スマホで拡大・縮小しないようにする -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <title>Hand-Drawn-Spectrum-Color-Display</title>

  <!-- スマホで画面がスクロール・ズレないようにする -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
